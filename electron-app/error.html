<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Brain — Offline</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #04030e;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    color: #c8d8f0;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    flex-direction: column;
    gap: 28px;
    user-select: none;
  }
  .orb {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 38%, rgba(125,216,255,0.18), rgba(125,216,255,0.04) 70%);
    border: 1px solid rgba(125,216,255,0.12);
    box-shadow: 0 0 32px rgba(125,216,255,0.06);
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50%       { opacity: 0.8; transform: scale(1.06); }
  }
  h1 {
    font-size: 11px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: rgba(200,216,240,0.35);
    font-weight: 400;
  }
  p {
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(200,216,240,0.14);
    text-align: center;
    line-height: 2.4;
  }
  button {
    background: transparent;
    border: 1px solid rgba(200,216,240,0.14);
    color: rgba(200,216,240,0.4);
    font-family: inherit;
    font-size: 9px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    padding: 10px 30px;
    cursor: pointer;
    border-radius: 4px;
    transition: border-color 0.2s, color 0.2s;
  }
  button:hover {
    border-color: rgba(125,216,255,0.35);
    color: rgba(125,216,255,0.8);
  }
  .hint {
    font-size: 8px;
    letter-spacing: 0.14em;
    color: rgba(200,216,240,0.08);
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="orb"></div>
  <h1>Memory Brain</h1>
  <p>
    Cannot reach the graph server.<br>
    Check your server is running and reachable,<br>
    then retry.
  </p>
  <button onclick="retryConnection()">Retry</button>
  <p class="hint">Ctrl+R also retries</p>

  <script>
    function retryConnection() {
      if (window.electronBridge) {
        window.electronBridge.retry();
      } else {
        window.location.reload();
      }
    }
  </script>
</body>
</html>
